<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iGEM Opening Animation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper: #ffffff;

      --line-color: rgba(171, 154, 138, 0.96);
      --line-glow: rgba(196, 179, 163, 0.22);

      --soil-dark: #9e7f67;
      --soil-mid: #b89881;
      --soil-light: #ded0c3;

      --root-main: rgba(113, 98, 87, 0.92);
      --root-soft: rgba(136, 118, 105, 0.72);

      --igem-color: rgba(118, 104, 92, 0.96);
      --igem-caret: rgba(147, 133, 121, 0.86);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    #home {
      position: relative;
      min-height: 100vh;
      background: #ffffff;
    }

    #intro {
      position: fixed;
      inset: 0;
      z-index: 50;
      overflow: hidden;
      background: #ffffff;
      isolation: isolate;
      will-change: transform;
    }

    #intro.slide-up {
      transform: translateY(-100%);
      transition: transform 950ms cubic-bezier(.2,.74,.16,1);
    }

    #horizon {
      position: absolute;
      left: 24px;
      width: calc(100vw - 48px);
      height: 2px;
      transform: scaleX(0.001);
      transform-origin: center;
      opacity: 1;
      z-index: 6;
      background:
        linear-gradient(90deg,
          rgba(171,154,138,0.00) 0%,
          rgba(171,154,138,0.92) 12%,
          rgba(171,154,138,0.98) 50%,
          rgba(171,154,138,0.92) 88%,
          rgba(171,154,138,0.00) 100%);
      box-shadow:
        0 0 8px var(--line-glow),
        0 1px 0 rgba(255,255,255,0.4);
      filter: blur(0.15px);
    }

    #droplet {
      position: absolute;
      left: 0;
      top: 0;
      width: 50px;
      height: 76px;
      opacity: 0;
      z-index: 8;
      transform-origin: 50% 88%;
      pointer-events: none;
      will-change: transform, opacity;
    }

    #droplet svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    #impactFlash, #impactRing, #impactSplash {
      position: absolute;
      left: 50%;
      top: 50%;
      pointer-events: none;
      opacity: 0;
      z-index: 9;
    }

    #impactFlash {
      width: 74px;
      height: 74px;
      background:
        radial-gradient(circle,
          rgba(88, 182, 255, 0.40) 0%,
          rgba(88, 182, 255, 0.14) 46%,
          transparent 76%);
      transform: translate(-50%, -50%) scale(0.2);
      filter: blur(1.6px);
    }

    #impactRing {
      width: 128px;
      height: 18px;
      border: 1.5px solid rgba(39, 142, 228, 0.62);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.24);
      filter: blur(0.2px);
    }

    #impactSplash {
      width: 108px;
      height: 54px;
      transform: translate(-50%, -50%) scale(0.2);
      transform-origin: 50% 50%;
    }

    #soil {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      opacity: 0;
      transform: scaleY(0);
      transform-origin: center top;
      z-index: 2;
      background:
        radial-gradient(circle at 16% 22%, rgba(107,86,71,0.14) 0 2px, transparent 3px),
        radial-gradient(circle at 24% 50%, rgba(111,90,74,0.13) 0 1.8px, transparent 2.6px),
        radial-gradient(circle at 72% 34%, rgba(101,80,67,0.14) 0 2px, transparent 3px),
        radial-gradient(circle at 66% 71%, rgba(96,77,63,0.13) 0 2px, transparent 3px),
        linear-gradient(180deg, var(--soil-light) 0%, var(--soil-mid) 56%, var(--soil-dark) 100%);
    }

    #soil::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,0.10) 0%, transparent 28%),
        radial-gradient(circle at 78% 30%, rgba(255,255,255,0.07) 0%, transparent 26%),
        radial-gradient(circle at 50% 72%, rgba(0,0,0,0.06) 0%, transparent 34%),
        linear-gradient(
          180deg,
          rgba(255,255,255,0.18) 0%,
          rgba(255,255,255,0.05) 22%,
          transparent 52%,
          rgba(0,0,0,0.08) 100%
        );
      opacity: 0.9;
      mix-blend-mode: multiply;
    }

    #rootsSvg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      z-index: 5;
      pointer-events: none;
    }

    .root {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0;
      filter: drop-shadow(0 0 1px rgba(255,255,255,0.14));
    }

    .root.main   { stroke: var(--root-main); }
    .root.branch { stroke: var(--root-soft); }

    #igemWord {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      z-index: 12;
      opacity: 0;
      display: inline-flex;
      align-items: flex-end;
      white-space: nowrap;
      font-family: "Playfair Display", "Georgia", "Times New Roman", serif;
      font-weight: 500;
      font-style: italic;
      font-size: clamp(48px, 7.2vw, 92px);
      line-height: 1;
      letter-spacing: 0.04em;
      color: var(--igem-color);
      text-shadow:
        0 1px 0 rgba(255,255,255,0.72),
        0 5px 12px rgba(170, 154, 143, 0.10);
      will-change: opacity;
    }

    #igemWord.show {
      opacity: 1;
      transition: opacity 220ms ease;
    }

    #igemMask {
      display: inline-block;
      width: 0;
      overflow: hidden;
      white-space: nowrap;
      vertical-align: bottom;
    }

    #igemText {
      display: inline-block;
      white-space: nowrap;
    }

    #igemCaret {
      display: inline-block;
      width: 2px;
      height: 0.86em;
      margin-left: 5px;
      vertical-align: -0.06em;
      background: var(--igem-caret);
      opacity: 0;
    }

    #igemWord.typing #igemCaret {
      opacity: 1;
      animation: blinkCaret 0.72s step-end infinite;
    }

    @keyframes blinkCaret {
      0%, 48%   { opacity: 1; }
      49%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <main id="home"></main>

  <div id="intro">
    <div id="soil">
      <svg id="rootsSvg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div id="horizon"></div>

    <div id="igemWord" aria-hidden="true">
      <span id="igemMask">
        <span id="igemText">iGEM</span>
      </span>
      <span id="igemCaret"></span>
    </div>

    <div id="droplet" aria-hidden="true">
      <svg id="dropSvg" viewBox="0 0 64 96" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="softPencil" x="-20%" y="-20%" width="140%" height="140%">
            <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" seed="4" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.05" xChannelSelector="R" yChannelSelector="G"/>
          </filter>

          <filter id="edgePencil" x="-15%" y="-15%" width="130%" height="130%">
            <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="9" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.35" xChannelSelector="R" yChannelSelector="G"/>
          </filter>

          <linearGradient id="dropFill" x1="22%" y1="8%" x2="78%" y2="94%">
            <stop offset="0%"   stop-color="#f2fbff"/>
            <stop offset="18%"  stop-color="#d1f0ff"/>
            <stop offset="44%"  stop-color="#82d2ff"/>
            <stop offset="72%"  stop-color="#2fa9f5"/>
            <stop offset="100%" stop-color="#0f79d8"/>
          </linearGradient>

          <radialGradient id="dropShade" cx="72%" cy="78%" r="44%">
            <stop offset="0%"   stop-color="rgba(13,110,205,0.38)"/>
            <stop offset="100%" stop-color="rgba(13,110,205,0)"/>
          </radialGradient>

          <pattern id="dropHatch" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(28)">
            <line x1="0" y1="0" x2="0" y2="4" stroke="rgba(8,120,220,0.14)" stroke-width="1"/>
          </pattern>

          <pattern id="dropHatch2" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(-18)">
            <line x1="0" y1="0" x2="0" y2="5" stroke="rgba(255,255,255,0.11)" stroke-width="1"/>
          </pattern>
        </defs>

        <path
          id="dGhost"
          d="M32 4 C39 15,46 27,52 45 C56 61,53 78,43 88 C39 92,35 94,32 94 C29 94,25 92,21 88 C11 78,8 61,12 45 C18 27,25 15,32 4 Z"
          fill="none"
          stroke="rgba(31,153,242,0.24)"
          stroke-width="1.2"
          stroke-linecap="round"
          stroke-dasharray="2 5"
          filter="url(#edgePencil)"
        />

        <path
          id="dOutline2"
          d="M32 4 C39 15,46 27,52 45 C56 61,53 78,43 88 C39 92,35 94,32 94 C29 94,25 92,21 88 C11 78,8 61,12 45 C18 27,25 15,32 4 Z"
          fill="none"
          stroke="rgba(8,125,219,0.42)"
          stroke-width="4.2"
          stroke-linecap="round"
          stroke-linejoin="round"
          filter="url(#edgePencil)"
        />

        <path
          id="dBody"
          d="M32 4 C39 15,46 27,52 45 C56 61,53 78,43 88 C39 92,35 94,32 94 C29 94,25 92,21 88 C11 78,8 61,12 45 C18 27,25 15,32 4 Z"
          fill="url(#dropFill)"
          stroke="none"
          filter="url(#softPencil)"
        />

        <path
          id="dShadePath"
          d="M32 4 C39 15,46 27,52 45 C56 61,53 78,43 88 C39 92,35 94,32 94 C29 94,25 92,21 88 C11 78,8 61,12 45 C18 27,25 15,32 4 Z"
          fill="url(#dropShade)"
          opacity="0.68"
        />

        <path
          id="dHatch"
          d="M32 4 C39 15,46 27,52 45 C56 61,53 78,43 88 C39 92,35 94,32 94 C29 94,25 92,21 88 C11 78,8 61,12 45 C18 27,25 15,32 4 Z"
          fill="url(#dropHatch)"
          opacity="0.78"
        />

        <path
          id="dHatch2"
          d="M32 4 C39 15,46 27,52 45 C56 61,53 78,43 88 C39 92,35 94,32 94 C29 94,25 92,21 88 C11 78,8 61,12 45 C18 27,25 15,32 4 Z"
          fill="url(#dropHatch2)"
          opacity="0.5"
        />

        <path
          id="dOutline"
          d="M32 4 C39 15,46 27,52 45 C56 61,53 78,43 88 C39 92,35 94,32 94 C29 94,25 92,21 88 C11 78,8 61,12 45 C18 27,25 15,32 4 Z"
          fill="none"
          stroke="#0b8ae8"
          stroke-width="2.35"
          stroke-linecap="round"
          stroke-linejoin="round"
          filter="url(#edgePencil)"
        />

        <path
          d="M22 23 C19 32,18 41,20 50"
          fill="none"
          stroke="rgba(255,255,255,0.76)"
          stroke-width="4"
          stroke-linecap="round"
          filter="url(#softPencil)"
        />
        <path
          d="M23 24 C21 32,20 40,21.8 48"
          fill="none"
          stroke="rgba(255,255,255,0.48)"
          stroke-width="2.2"
          stroke-linecap="round"
        />
        <path
          d="M29 13 C27 17,26 21,27 25"
          fill="none"
          stroke="rgba(255,255,255,0.54)"
          stroke-width="2.6"
          stroke-linecap="round"
          filter="url(#softPencil)"
        />
        <path
          d="M19 79 C24 87,30 90,38 89 C43 88,46 86,49 82"
          fill="none"
          stroke="rgba(165,214,255,0.60)"
          stroke-width="2.5"
          stroke-linecap="round"
          filter="url(#softPencil)"
        />
        <path
          d="M43 40 C45 50,44 63,40 75"
          fill="none"
          stroke="rgba(8,95,187,0.24)"
          stroke-width="3.1"
          stroke-linecap="round"
          filter="url(#softPencil)"
        />
      </svg>
    </div>

    <div id="impactFlash"></div>
    <div id="impactRing"></div>

    <svg id="impactSplash" viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path
        d="M8 48 C20 46,24 34,32 36 C38 37,39 46,44 46 C49 46,50 31,60 26 C70 31,71 46,76 46 C81 46,82 37,88 36 C96 34,100 46,112 48"
        fill="none"
        stroke="rgba(25, 145, 234, 0.90)"
        stroke-width="2.1"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </div>

  <script>
    (() => {
      const intro        = document.getElementById("intro");
      const horizon      = document.getElementById("horizon");
      const droplet      = document.getElementById("droplet");
      const impactFlash  = document.getElementById("impactFlash");
      const impactRing   = document.getElementById("impactRing");
      const impactSplash = document.getElementById("impactSplash");
      const soil         = document.getElementById("soil");
      const rootsSvg     = document.getElementById("rootsSvg");

      const igemWord = document.getElementById("igemWord");
      const igemMask = document.getElementById("igemMask");
      const igemText = document.getElementById("igemText");
      const igemCaret= document.getElementById("igemCaret");

      const HORIZON_MS = 150;
      const DROP_MS    = 600;
      const IMPACT_MS  = 240;

      const SOIL_MS = 1500;
      const TYPE_MS = 760;
      const EXIT_MS = 950;

      let layout = null;
      let rootPaths = [];
      let rafId = null;
      let typeRafId = null;
      let timers = [];

      const clamp         = (v, mn, mx) => Math.min(mx, Math.max(mn, v));
      const easeOutCubic  = t => 1 - Math.pow(1 - t, 3);
      const easeInCubic   = t => t * t * t;
      const easeInOutSine = t => -(Math.cos(Math.PI * t) - 1) / 2;
      const lerp          = (a, b, t) => a + (b - a) * t;

      function setLayout() {
        const W = window.innerWidth;
        const H = window.innerHeight;
        const horizonY = Math.round(H * 0.40);
        const soilHeight = H - horizonY;
        const centerX = W / 2;

        const originalStartY = horizonY - Math.min(150, H * 0.18);
        const apexY = originalStartY - Math.min(78, H * 0.10);
        const apexX = centerX + Math.min(76, W * 0.085);

        layout = {
          W, H,
          horizonY,
          soilHeight,
          centerX,
          startY: originalStartY,
          apexX,
          apexY,
          endX: centerX,
          endY: horizonY - 10
        };

        horizon.style.top       = `${horizonY}px`;
        soil.style.top          = `${horizonY}px`;
        soil.style.height       = `${soilHeight}px`;
        impactFlash.style.top   = `${horizonY + 1}px`;
        impactRing.style.top    = `${horizonY + 2}px`;
        impactSplash.style.left = `${centerX}px`;
        impactSplash.style.top  = `${horizonY + 1}px`;
        igemWord.style.top      = `${horizonY - Math.min(96, H * 0.12)}px`;

        buildRoots(W, soilHeight);
      }

      function getPoint(t) {
        const { apexX, apexY, endX, endY } = layout;
        const p = easeInCubic(clamp(t, 0, 1));
        return {
          x: lerp(apexX, endX, p),
          y: lerp(apexY, endY, p)
        };
      }

      function getOpacityByY(y) {
        const { apexY, startY } = layout;
        return clamp((y - apexY) / (startY - apexY), 0, 1);
      }

      function getMotionVector() {
        const dx = layout.endX - layout.apexX;
        const dy = layout.endY - layout.apexY;
        const len = Math.hypot(dx, dy) || 1;
        return {
          dx, dy,
          ux: dx / len,
          uy: dy / len,
          len
        };
      }

      function getMotionDeg() {
        const { dx, dy } = getMotionVector();
        return Math.atan2(dy, dx) * 180 / Math.PI;
      }

      function getDropAngle() {
        const motionDeg = getMotionDeg();
        return motionDeg - 90;
      }

      function render(now, startTime) {
        const elapsed = now - startTime;
        const dropAngle = getDropAngle();
        const motion = getMotionVector();

        if (elapsed <= HORIZON_MS) {
          const t = clamp(elapsed / HORIZON_MS, 0, 1);
          const e = easeOutCubic(t);

          horizon.style.opacity = "1";
          horizon.style.transform = `scaleX(${Math.max(0.001, e)})`;

          droplet.style.opacity = "0";
          droplet.style.transform =
            `translate3d(${layout.apexX - 25}px, ${layout.apexY - 38}px, 0)
             rotate(${dropAngle}deg)
             scale(0.96,1.04)`;
          return true;
        }

        const me = elapsed - HORIZON_MS;

        if (me <= DROP_MS) {
          const t = clamp(me / DROP_MS, 0, 1);
          const pt = getPoint(t);
          const speed = easeInCubic(t);
          const opacity = getOpacityByY(pt.y);

          const scaleX = 1 - speed * 0.06;
          const scaleY = 1 + speed * 0.16;

          droplet.style.opacity = String(opacity);
          droplet.style.transform =
            `translate3d(${pt.x - 25}px, ${pt.y - 38}px, 0)
             rotate(${dropAngle}deg)
             scale(${scaleX}, ${scaleY})`;
          return true;
        }

        const ie = me - DROP_MS;
        if (ie <= IMPACT_MS) {
          const t = clamp(ie / IMPACT_MS, 0, 1);
          const e = easeOutCubic(t);

          const baseX = layout.endX;
          const baseY = layout.endY;

          const forwardShift = 8 * e;
          const shiftX = motion.ux * forwardShift;
          const shiftY = motion.uy * forwardShift;

          const squashX = 1 + 0.72 * e;
          const squashY = 1 - 0.56 * e;
          const skew = -10 * e;

          droplet.style.opacity = String(1 - 0.88 * t);
          droplet.style.transform =
            `translate3d(${baseX - 25 + shiftX}px, ${baseY - 38 + shiftY}px, 0)
             rotate(${dropAngle}deg)
             skewX(${skew}deg)
             scale(${squashX}, ${squashY})`;
          return true;
        }

        droplet.style.opacity = "0";
        return false;
      }

      function createRootPath(d, w, cls, delay, duration) {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", d.replace(/\s+/g, " ").trim());
        path.setAttribute("class", `root ${cls}`);
        path.setAttribute("stroke-width", w);
        rootsSvg.appendChild(path);

        const len = path.getTotalLength();
        path.style.strokeDasharray = len;
        path.style.strokeDashoffset = len;
        path.dataset.len = len;
        path.dataset.delay = delay;
        path.dataset.duration = duration;
        return path;
      }

      function buildRoots(W, H) {
        rootsSvg.innerHTML = "";
        rootsSvg.setAttribute("viewBox", `0 0 ${W} ${H}`);
        rootsSvg.setAttribute("preserveAspectRatio", "none");
        rootPaths = [];

        const cx = W / 2;
        const h = H;

        rootPaths.push(createRootPath(
          `M${cx} 0 C${cx+3} ${h*.08},${cx-8} ${h*.18},${cx-2} ${h*.30}
           C${cx+8} ${h*.42},${cx-6} ${h*.58},${cx+4} ${h*.72}
           C${cx+10} ${h*.82},${cx+4} ${h*.91},${cx+1} ${h*.99}`,
          3.1, "main", 80, 1180
        ));

        rootPaths.push(createRootPath(
          `M${cx-3} ${h*.20} C${cx-16} ${h*.24},${cx-34} ${h*.30},${cx-62} ${h*.36}
           C${cx-92} ${h*.42},${cx-116} ${h*.50},${cx-140} ${h*.58}`,
          1.9, "branch", 300, 760
        ));

        rootPaths.push(createRootPath(
          `M${cx-63} ${h*.36} C${cx-78} ${h*.40},${cx-96} ${h*.46},${cx-112} ${h*.53}`,
          1.2, "branch", 520, 500
        ));

        rootPaths.push(createRootPath(
          `M${cx+2} ${h*.34} C${cx+20} ${h*.39},${cx+40} ${h*.44},${cx+78} ${h*.50}
           C${cx+104} ${h*.54},${cx+122} ${h*.60},${cx+138} ${h*.66}`,
          1.9, "branch", 420, 760
        ));

        rootPaths.push(createRootPath(
          `M${cx+80} ${h*.50} C${cx+92} ${h*.56},${cx+104} ${h*.62},${cx+110} ${h*.69}`,
          1.1, "branch", 650, 460
        ));

        rootPaths.push(createRootPath(
          `M${cx+3} ${h*.56} C${cx-10} ${h*.61},${cx-28} ${h*.68},${cx-56} ${h*.77}
           C${cx-72} ${h*.82},${cx-82} ${h*.88},${cx-92} ${h*.95}`,
          1.7, "branch", 620, 680
        ));

        rootPaths.push(createRootPath(
          `M${cx+6} ${h*.72} C${cx+18} ${h*.78},${cx+34} ${h*.84},${cx+52} ${h*.92}`,
          1.5, "branch", 780, 520
        ));

        rootPaths.push(createRootPath(
          `M${cx-1} ${h*.93} C${cx-6} ${h*.96},${cx-11} ${h*.985},${cx-17} ${h*1.02}`,
          1.05, "branch", 980, 360
        ));

        rootPaths.push(createRootPath(
          `M${cx+1} ${h*.95} C${cx+6} ${h*.98},${cx+12} ${h*1.0},${cx+18} ${h*1.025}`,
          0.98, "branch", 1030, 320
        ));
      }

      function resetScene() {
        intro.classList.remove("slide-up");
        intro.style.display = "block";

        horizon.style.opacity = "1";
        horizon.style.transform = "scaleX(0.001)";

        droplet.style.opacity = "0";
        droplet.style.transform = "translate3d(0,0,0)";

        impactFlash.style.opacity = "0";
        impactFlash.style.transform = "translate(-50%,-50%) scale(0.2)";

        impactRing.style.opacity = "0";
        impactRing.style.transform = "translate(-50%,-50%) scale(0.24)";

        impactSplash.style.opacity = "0";
        impactSplash.style.transform = "translate(-50%,-50%) rotate(0deg) translate(0px,0px) scale(0.2)";

        soil.style.opacity = "0";
        soil.style.transform = "scaleY(0)";

        igemWord.classList.remove("show", "typing");
        igemMask.style.width = "0px";
        igemText.textContent = "iGEM";
        igemCaret.style.opacity = "0";

        rootPaths.forEach(p => {
          p.style.opacity = "0";
          p.style.transition = "none";
          p.style.strokeDashoffset = p.dataset.len;
        });
      }

      function playImpact() {
        const motionDeg = getMotionDeg();

        impactFlash.animate(
          [
            { opacity: 0, transform: "translate(-50%,-50%) scale(0.2)" },
            { opacity: 1, transform: "translate(-50%,-50%) scale(1.04)", offset: 0.28 },
            { opacity: 0, transform: "translate(-50%,-50%) scale(1.42)" }
          ],
          {
            duration: 420,
            easing: "cubic-bezier(.18,.72,.2,1)",
            fill: "forwards"
          }
        );

        impactRing.animate(
          [
            { opacity: 0.82, transform: "translate(-50%,-50%) scale(0.24)" },
            { opacity: 0.40, transform: "translate(-50%,-50%) scale(1.08,0.72)", offset: 0.55 },
            { opacity: 0, transform: "translate(-50%,-50%) scale(1.78,0.84)" }
          ],
          {
            duration: 620,
            easing: "cubic-bezier(.14,.78,.15,1)",
            fill: "forwards"
          }
        );

        impactSplash.animate(
          [
            {
              opacity: 0,
              transform:
                `translate(-50%,-50%)
                 rotate(${motionDeg}deg)
                 translate(0px, 0px)
                 scale(0.2)`
            },
            {
              opacity: 1,
              transform:
                `translate(-50%,-50%)
                 rotate(${motionDeg}deg)
                 translate(12px, -3px)
                 scale(1.02)`,
              offset: 0.30
            },
            {
              opacity: 0,
              transform:
                `translate(-50%,-50%)
                 rotate(${motionDeg}deg)
                 translate(28px, -6px)
                 scale(1.42)`
            }
          ],
          {
            duration: 540,
            easing: "cubic-bezier(.18,.75,.22,1)",
            fill: "forwards"
          }
        );
      }

      function revealSoilAndRoots() {
        soil.animate(
          [
            { opacity: 0, transform: "scaleY(0)" },
            { opacity: 1, transform: "scaleY(1)" }
          ],
          {
            duration: SOIL_MS,
            easing: "cubic-bezier(.18,.74,.2,1)",
            fill: "forwards"
          }
        );

        rootPaths.forEach(path => {
          const delay = Number(path.dataset.delay);
          const duration = Number(path.dataset.duration);

          const id = setTimeout(() => {
            path.style.opacity = "1";
            path.style.transition =
              `stroke-dashoffset ${duration}ms cubic-bezier(.2,.76,.24,1), opacity 240ms ease`;
            path.style.strokeDashoffset = "0";
          }, delay);

          timers.push(id);
        });
      }

      function startTypewriter() {
        if (typeRafId) cancelAnimationFrame(typeRafId);

        igemText.textContent = "iGEM";
        igemWord.classList.add("show", "typing");
        igemCaret.style.opacity = "1";

        igemMask.style.width = "auto";
        const fullWidth = igemText.getBoundingClientRect().width;
        igemMask.style.width = "0px";

        const start = performance.now();

        function tick(now) {
          const p = clamp((now - start) / TYPE_MS, 0, 1);
          const eased = easeInOutSine(p);
          igemMask.style.width = `${fullWidth * eased}px`;

          if (p < 1) {
            typeRafId = requestAnimationFrame(tick);
          } else {
            igemMask.style.width = `${fullWidth}px`;
            igemWord.classList.remove("typing");
            igemCaret.style.opacity = "0";
            typeRafId = null;
          }
        }

        typeRafId = requestAnimationFrame(tick);
      }

      function slideIntroAway() {
        intro.classList.add("slide-up");
        const id = setTimeout(() => {
          intro.style.display = "none";
          document.body.style.overflow = "auto";
        }, EXIT_MS + 40);
        timers.push(id);
      }

      function clearAllTimers() {
        if (rafId) cancelAnimationFrame(rafId);
        if (typeRafId) cancelAnimationFrame(typeRafId);
        timers.forEach(id => clearTimeout(id));
        timers = [];
      }

      function start() {
        clearAllTimers();
        resetScene();

        const startTime = performance.now();
        let impactTriggered = false;

        function frame(now) {
          const alive = render(now, startTime);
          const elapsed = now - startTime;

          if (!impactTriggered && elapsed >= HORIZON_MS + DROP_MS) {
            impactTriggered = true;
            playImpact();
            revealSoilAndRoots();

            const t1 = setTimeout(startTypewriter, 150);
            timers.push(t1);

            const t2 = setTimeout(slideIntroAway, 150 + TYPE_MS + 360);
            timers.push(t2);
          }

          if (alive || elapsed < HORIZON_MS + DROP_MS + IMPACT_MS + TYPE_MS + EXIT_MS + 700) {
            rafId = requestAnimationFrame(frame);
          }
        }

        rafId = requestAnimationFrame(frame);
      }

      let resizeDebounce = null;

      function init() {
        clearAllTimers();
        setLayout();
        resetScene();
        start();
      }

      window.addEventListener("resize", () => {
        clearTimeout(resizeDebounce);
        resizeDebounce = setTimeout(init, 120);
      });

      init();
    })();
  </script>
</body>
</html>
