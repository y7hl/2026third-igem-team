<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/2026third-igem-team/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2026third-igem-team</title>
    <script type="module" crossorigin src="/2026third-igem-team/assets/index-CuPBXLsR.js"></script>
    <link rel="stylesheet" crossorigin href="/2026third-igem-team/assets/index-DykytF2W.css">
  </head>
  <body>
    <div
      id="boot-splash"
      style="position: fixed; inset: 0; z-index: 9999; background: #fff"
    >
      <iframe
        title="Opening Animation"
        src="/opening-animation.html"
        style="width: 100%; height: 100%; border: 0; display: block"
      ></iframe>
    </div>
    <div id="root"></div>
    <script>
      window.__IGEM_SPLASH_DONE__ = false;

      (function () {
        const splash = document.getElementById("boot-splash");

        function finishSplash() {
          if (window.__IGEM_SPLASH_DONE__) return;
          window.__IGEM_SPLASH_DONE__ = true;
          if (splash) splash.remove();
          window.dispatchEvent(new Event("IGEM_SPLASH_DONE"));
        }

        window.addEventListener("message", function (event) {
          if (event && event.data && event.data.type === "IGEM_SPLASH_DONE") {
            finishSplash();
          }
        });

        window.setTimeout(finishSplash, 15000);
      })();
    </script>
  </body>
</html>
