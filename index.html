<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2026third-igem-team</title>
  </head>
  <body>
    <script>
  const hasPlayed = sessionStorage.getItem("IGEM_SPLASH_PLAYED");

  if (!hasPlayed) {
    document.write(`
      <div id="boot-splash" style="position: fixed; inset: 0; z-index: 9999; background: #fff">
        <iframe
          title="Opening Animation"
          src="./opening-animation.html"
          style="width: 100%; height: 100%; border: 0; display: block"
        ></iframe>
      </div>
    `);
  }
</script>
    <div id="root"></div>
    <script>
      window.__IGEM_SPLASH_DONE__ = false;

      (function () {
        const splash = document.getElementById("boot-splash");

        function finishSplash() {
  if (window.__IGEM_SPLASH_DONE__) return;
  window.__IGEM_SPLASH_DONE__ = true;

  // ✅ 标记已播放
  sessionStorage.setItem("IGEM_SPLASH_PLAYED", "true");

  if (splash) splash.remove();
  window.dispatchEvent(new Event("IGEM_SPLASH_DONE"));
}

        window.addEventListener("message", function (event) {
          if (event && event.data && event.data.type === "IGEM_SPLASH_DONE") {
            finishSplash();
          }
        });

        window.setTimeout(finishSplash, 15000);
      })();
    </script>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
